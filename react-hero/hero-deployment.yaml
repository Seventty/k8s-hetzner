apiVersion: apps/v1
kind: Deployment
metadata:
  name: react-hero
  labels:
    app.kubernetes.io/name: react-hero
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: react-hero
  template:
    metadata:
      labels:
        app.kubernetes.io/name: react-hero
    spec:
      containers:
        - name: react-hero
          image: seventty/react-kubernetes-hero:latest
          ports:
            - containerPort: 80
      dnsConfig:
        options:
          - name: ndots
            value: "2"

---
apiVersion: v1
kind: Service
metadata:
  name: react-hero
  labels:
    app.kubernetes.io/name: react-hero
  annotations:
    load-balancer.hetzner.cloud/location: hel1
    load-balancer.hetzner.cloud/disable-private-ingress: "true"
    load-balancer.hetzner.cloud/use-private-ip: "true"
    load-balancer.hetzner.cloud/name: "kubelb-react"
spec:
  selector:
    app.kubernetes.io/name: react-hero
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 80
  type: LoadBalancer
